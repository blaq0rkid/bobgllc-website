
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Received | Black Orchid Business Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        obsidian: '#050505',
                        gold: '#D4AF37',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-black min-h-screen">
    
    <div class="min-h-screen flex items-center justify-center p-8">
        <div class="relative w-full max-w-2xl overflow-hidden rounded-2xl border border-white/10 bg-white/5 p-12 backdrop-blur-xl shadow-2xl">
            
            <!-- Subtle Gold Gradient Accent -->
            <div class="absolute inset-0 bg-gradient-to-br from-[#D4AF37]/10 to-transparent pointer-events-none"></div>

            <div class="relative z-10 text-center">
                <!-- Icon / Status -->
                <div class="mb-6 inline-flex h-16 w-16 items-center justify-center rounded-full border border-[#D4AF37]/30 bg-black/40 text-[#D4AF37]">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z" />
                    </svg>
                </div>

                <!-- Message -->
                <h1 class="mb-4 text-3xl font-bold tracking-widest text-white uppercase font-serif">
                    Intelligence Received
                </h1>
                
                <p class="mb-8 text-lg text-gray-400 font-light leading-relaxed">
                    Your data has been successfully encrypted and transmitted to our strategy team. <br>
                    Our analysts are reviewing your profile for alignment.
                    <span class="block mt-2 text-[#D4AF37]/80 italic">Expect a transmission within 24-48 hours.</span>
                </p>

                <!-- CTA -->
                <a href="/" class="inline-block px-10 py-3 text-sm font-semibold tracking-widest text-black uppercase transition-all bg-[#D4AF37] hover:bg-[#F5D76E] hover:scale-105 active:scale-95">
                    Return to Operations
                </a>
            </div>
            
            <!-- Corner Decoration -->
            <div class="absolute bottom-0 right-0 p-4">
                <span class="text-[10px] uppercase tracking-tighter text-white/20 font-mono">BOBG // SECURE SUBMISSION // 2026</span>
            </div>
        </div>
    </div>

</body>
</html>
